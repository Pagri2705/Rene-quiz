<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Mail-Bestätigung — Modern Athlete Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6FA; --panel:#FFFFFF; --line:#DDE3EE; --text:#151B26; --muted:#5B6779;
  --accent:#4C8EFF; --accent-strong:#6FA6FF; --green:#3DDC97; --red:#FF6B6B;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0D1219; --panel:#141B25; --line:#232D3D; --text:#EDF1F7; --muted:#8B97A8; }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;
}
.card{
  max-width:380px;width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:36px 28px;text-align:center;
}
.icon{font-size:44px;margin-bottom:16px}
h1{font-family:'Sora';font-weight:800;font-size:20px;margin-bottom:10px;line-height:1.3}
p{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:24px}
a.cta{
  display:inline-block;background:var(--accent);color:#0D1219;text-decoration:none;
  font-family:'Sora';font-weight:700;font-size:14px;padding:13px 24px;border-radius:14px;
}
a.cta:hover{background:var(--accent-strong)}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Wird überprüft …</h1>
  <p id="message">Einen Moment bitte.</p>
  <a class="cta" id="backLink" href="/">Zur App</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAmNKAXWVxAanUpqB-1KQawyM7Wl-LR0vM",
  authDomain: "rene-quiz.firebaseapp.com",
  projectId: "rene-quiz",
  storageBucket: "rene-quiz.firebasestorage.app",
  messagingSenderId: "1050370639137",
  appId: "1:1050370639137:web:7280095aaa905f0e806a60"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode');
const oobCode = params.get('oobCode');

const icon = document.getElementById('icon');
const title = document.getElementById('title');
const message = document.getElementById('message');

(async () => {
  if(mode === 'verifyEmail' && oobCode){
    try{
      await applyActionCode(auth, oobCode);
      icon.textContent = '✅';
      title.textContent = 'Erfolgreich verifiziert!';
      message.textContent = 'Deine E-Mail-Adresse wurde bestätigt. Du kannst jetzt zur App zurückkehren.';
    }catch(e){
      icon.textContent = '⚠️';
      title.textContent = 'Link ungültig oder abgelaufen';
      message.textContent = 'Bitte fordere in der App eine neue Bestätigungs-Mail an.';
    }
  } else if(mode === 'resetPassword' && oobCode){
    icon.textContent = '🔑';
    title.textContent = 'Passwort zurücksetzen';
    message.textContent = 'Dieser Link öffnet die Passwort-Zurücksetzung nicht direkt hier — bitte den Link erneut über die App anfordern, falls er nicht funktioniert hat.';
  } else {
    icon.textContent = '⚠️';
    title.textContent = 'Ungültiger Link';
    message.textContent = 'Dieser Bestätigungslink ist nicht gültig.';
  }
})();
</script>
</body>
</html>
